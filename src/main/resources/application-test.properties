# Override prod datasource with in-memory H2
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
#spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Dummy JWT values (no real secret needed in tests)
jwt.secret=thisisaverylongsecretkeyfortestingpurposesonly1234567890abcdef
jwt.expiration=3600000

# Stub Google OAuth so context doesn't need real credentials
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret